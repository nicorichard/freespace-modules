id = "elixir"
name = "Elixir & Mix Caches"
version = "1.0.0"
description = "Hex package cache and project-local Mix build artifacts."
author = "freespace"
platforms = ["macos", "linux"]
icon = ""
icon_color = "#4B275F"

[[targets]]
path = "~/.hex/packages"
description = "Hex package download cache"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Caches/mix/installs"
description = "Mix archive and escript installs cache"
risk = "safe"
restore = "auto"
platforms = ["macos"]
