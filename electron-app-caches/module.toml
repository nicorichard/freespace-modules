id = "electron-app-caches"
name = "Electron App Caches"
version = "1.0.0"
description = "Caches from Electron-based apps stored outside ~/Library/Caches. Rebuilt on next app launch."
author = "freespace"
platforms = ["macos"]
icon = ""

[[targets]]
path = "~/Library/Application Support/Code/Cache"
description = "VS Code cache"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Application Support/Code/CachedData"
description = "VS Code cached extension data"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Application Support/Code/CachedExtensionVSIXs"
description = "VS Code cached extension packages"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Application Support/Code/Code Cache"
description = "VS Code V8 code cache"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Application Support/Code/logs"
description = "VS Code logs"
risk = "safe"
restore = "auto"

[[targets]]
path = "~/Library/Application Support/Cursor/Cache"
description = "Cursor IDE cache"
risk = "safe"
