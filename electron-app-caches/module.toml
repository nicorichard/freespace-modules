id = "electron-app-caches"
name = "Electron App Caches"
version = "1.0.0"
description = "Caches from Electron-based apps stored outside ~/Library/Caches. Safe to delete; rebuilt on next app launch."
author = "freespace"
platforms = ["macos"]

[[targets]]
path = "~/Library/Application Support/Code/Cache"
description = "VS Code cache"

[[targets]]
path = "~/Library/Application Support/Code/CachedData"
description = "VS Code cached extension data"

[[targets]]
path = "~/Library/Application Support/Code/CachedExtensionVSIXs"
description = "VS Code cached extension packages"

[[targets]]
path = "~/Library/Application Support/Code/Code Cache"
description = "VS Code V8 code cache"

[[targets]]
path = "~/Library/Application Support/Code/logs"
description = "VS Code logs"

[[targets]]
path = "~/Library/Application Support/Cursor/Cache"
description = "Cursor IDE cache"

[[targets]]
path = "~/Library/Application Support/Cursor/CachedData"
description = "Cursor IDE cached data"

[[targets]]
path = "~/Library/Application Support/Cursor/Code Cache"
description = "Cursor IDE V8 code cache"

[[targets]]
path = "~/Library/Application Support/Cursor/logs"
description = "Cursor IDE logs"

[[targets]]
path = "~/Library/Application Support/discord/Cache"
description = "Discord cache"

[[targets]]
path = "~/Library/Application Support/discord/Code Cache"
description = "Discord V8 code cache"

[[targets]]
path = "~/Library/Application Support/Slack/Cache"
description = "Slack cache"

[[targets]]
path = "~/Library/Application Support/Slack/Code Cache"
description = "Slack V8 code cache"

[[targets]]
path = "~/Library/Application Support/Slack/Service Worker/CacheStorage"
description = "Slack service worker cache"

[[targets]]
path = "~/Library/Application Support/Notion/Cache"
description = "Notion cache"

[[targets]]
path = "~/Library/Application Support/Notion/Code Cache"
description = "Notion V8 code cache"

[[targets]]
path = "~/Library/Application Support/obsidian/Cache"
description = "Obsidian cache"

[[targets]]
path = "~/Library/Application Support/obsidian/Code Cache"
description = "Obsidian V8 code cache"

[[targets]]
path = "~/Library/Application Support/Linear/Cache"
description = "Linear cache"

[[targets]]
path = "~/Library/Application Support/Linear/Code Cache"
description = "Linear V8 code cache"
