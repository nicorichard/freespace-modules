name = "Kotlin/Native Cache"
version = "1.0.0"
description = "Kotlin/Native compiler cache and dependencies. Safe to delete; re-downloaded on next build."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/.konan/cache"
description = "Kotlin/Native compilation cache"

[[targets]]
path = "~/.konan/dependencies"
description = "Kotlin/Native toolchain dependencies (LLVM, etc.)"

[[targets]]
path = "~/.konan/kotlin-native-prebuilt-*"
description = "Prebuilt Kotlin/Native compiler distributions"
