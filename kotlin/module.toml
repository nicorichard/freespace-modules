id = "kotlin"
name = "Kotlin Caches"
version = "1.0.0"
description = "Kotlin compiler and Kotlin/Native caches. Safe to delete; re-created on next build."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/.konan/cache"
description = "Kotlin/Native compilation cache"

[[targets]]
path = "~/.konan/dependencies"
description = "Kotlin/Native toolchain dependencies (LLVM, etc.)"

[[targets]]
path = "~/.konan/kotlin-native-prebuilt-*"
description = "Prebuilt Kotlin/Native compiler distributions"

[[targets]]
path = "~/.kotlin/daemon"
description = "Kotlin compiler daemon files"
platforms = ["linux"]

[[targets]]
path = "~/.kotlin/sessions"
description = "Kotlin compiler session state files"

[[targets]]
path = "~/Library/Application Support/kotlin/daemon"
description = "Kotlin compiler daemon files"
platforms = ["macos"]
