name = "Docker"
version = "1.0.0"
description = "Docker Desktop disk images and build cache. Clearing may require re-pulling images."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/Library/Containers/com.docker.docker/Data/vms/0/data"
description = "Docker Desktop VM disk image (macOS)"

[[targets]]
path = "~/.docker/buildx"
description = "Docker Buildx build cache"
