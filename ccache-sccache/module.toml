id = "ccache-sccache"
name = "C/C++ Compilation Caches"
version = "1.0.0"
description = "Compilation caches from ccache and sccache."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/.ccache"
description = "ccache compilation cache"
risk = "safe"
restore = "Rebuilt on next C/C++ build"

[[targets]]
path = "~/.cache/sccache"
description = "sccache compilation cache"
risk = "safe"
restore = "Rebuilt on next build"
