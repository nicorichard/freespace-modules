id = "haskell"
name = "Haskell Caches"
version = "1.0.0"
description = "Stack, Cabal, and GHC caches and project-local build artifacts."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/.stack"
description = "Stack package database and snapshots"
risk = "safe"
restore = "Rebuilt on next `stack build`"

[[targets]]
path = "~/.cabal"
description = "Cabal package store and download cache"
risk = "safe"
restore = "Rebuilt on next `cabal build`"

[[targets]]
path = "~/.ghc"
description = "GHC compiler caches and settings"
risk = "safe"
restore = "Rebuilt on next GHC use"

[[targets]]
path = "**/.stack-work"
description = "Stack project-local build output"
risk = "safe"
restore = "Rebuilt by `stack build`"

[[targets]]
path = "**/dist-newstyle"
description = "Cabal new-build output"
risk = "safe"
restore = "Rebuilt by `cabal build`"
