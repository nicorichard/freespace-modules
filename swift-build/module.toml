id = "swift-build"
name = "Swift Build Artifacts"
version = "1.0.0"
description = "Project-local Swift build artifacts. Safe to delete; regenerated by swift build."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "**/.build"
description = "Swift build artifacts directory"

[[targets]]
path = "**/.swiftpm"
description = "Per-project Swift PM workspace state"
