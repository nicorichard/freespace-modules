id = "adobe-cache"
name = "Adobe Caches"
version = "1.0.0"
description = "Adobe Creative Cloud media caches and logs. Safe to delete; caches are rebuilt when projects are opened."
author = "freespace"
platforms = ["macos"]

[[targets]]
path = "~/Library/Application Support/Adobe/Common/Media Cache Files"
description = "Adobe media cache files (Premiere, After Effects)"

[[targets]]
path = "~/Library/Application Support/Adobe/Common/Media Cache"
description = "Adobe media cache database"

[[targets]]
path = "/Library/Logs/Adobe"
description = "Adobe application logs"

[[targets]]
path = "/Library/Logs/CreativeCloud"
description = "Creative Cloud installer and updater logs"
