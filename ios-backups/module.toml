name = "iOS Device Backups"
version = "1.0.0"
description = "Local iOS/iPadOS device backups. Can be very large. Review before deleting — these are your device backups."
author = "freespace"
platforms = ["macos"]

[[targets]]
path = "~/Library/Application Support/MobileSync/Backup/*"
description = "iTunes/Finder device backups (can be tens of GB each)"
