id = "test-browsers"
name = "Test Browser Downloads"
version = "1.0.0"
description = "Downloaded browser binaries for Cypress, Playwright, and Puppeteer testing."
author = "freespace"
platforms = ["macos", "linux"]

[[targets]]
path = "~/Library/Caches/Cypress"
description = "Cypress browser downloads"
risk = "safe"
restore = "manual"
restore_steps = "Run `cypress install`"
platforms = ["macos"]

[[targets]]
path = "~/.cache/Cypress"
description = "Cypress browser downloads"
risk = "safe"
restore = "manual"
restore_steps = "Run `cypress install`"
platforms = ["linux"]

[[targets]]
path = "~/Library/Caches/ms-playwright"
description = "Playwright browser downloads"
risk = "safe"
restore = "manual"
restore_steps = "Run `playwright install`"
platforms = ["macos"]

[[targets]]
path = "~/.cache/ms-playwright"
description = "Playwright browser downloads"
risk = "safe"
restore = "manual"
restore_steps = "Run `playwright install`"
platforms = ["linux"]

[[targets]]
path = "~/.cache/puppeteer"
description = "Puppeteer Chromium downloads"
risk = "safe"
restore = "auto"
